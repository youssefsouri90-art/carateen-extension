name: Build Carateen CS3

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: gradle CarateenProvider:make

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carateen-build
          path: |
            **/build/**/*.cs3
            **/build/**/*.zip
            **/build/**/*.jar
